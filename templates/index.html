<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>PiMusic</title>
  <link rel="stylesheet8" href="/static/style.css?v=46">
</head>
<body>
  <!-- Full-screen blurred background layer -->
  <div id="bg-layer" class="bg-layer"></div>
  <div id="bg-overlay" class="bg-overlay"></div>

  <main class="player">
    <!-- Connection / device badge -->
    <div class="topbar">
      <div class="source-dropdown-wrap">
        <span id="source-badge" class="source-badge source-spotify" title="Playback source">
          <svg id="source-icon-spotify" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.6 0 12 0zm5.5 17.3c-.2.3-.6.4-1 .2-2.7-1.6-6-2-10-1.1-.4.1-.7-.2-.8-.5-.1-.4.2-.7.5-.8 4.3-1 8-.6 11 1.2.4.2.5.6.3 1zm1.5-3.3c-.3.4-.8.5-1.2.3-3-1.9-7.7-2.4-11.3-1.3-.4.1-.9-.1-1-.6-.1-.4.1-.9.6-1 4.1-1.3 9.2-.7 12.6 1.5.3.2.5.7.3 1.1zm.1-3.4C15.7 8.5 9.1 8.3 5.3 9.4c-.5.2-1-.2-1.2-.7-.1-.5.2-1 .7-1.2C9 6.2 16.3 6.4 20.7 8.8c.5.3.6.9.4 1.4-.3.4-.9.6-1.4.3z"/></svg>
          <svg id="source-icon-cider" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="hidden"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          <span id="source-label">Spotify</span>
          <svg class="source-arrow" width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
        </span>
        <div id="source-dropdown" class="source-dropdown hidden">
          <div class="source-option" data-source="spotify">Spotify</div>
          <div class="source-option" data-source="cider">Apple Music</div>
        </div>
      </div>
      <span id="device-badge" class="device-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3Zm7 11a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V23h2v-2.06A9 9 0 0 0 21 12Z"/></svg>
        <span id="device-name">Connecting…</span>
      </span>
      <a href="/settings" class="settings-link" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
      </a>
    </div>

    <!-- Album art + canvas video overlay -->
    <div class="artwork-wrap" id="artwork-wrap">
      <img id="album-art" class="album-art" src="" alt="Album Art">
      <video id="canvas-video" class="canvas-video" autoplay loop muted playsinline preload="auto" disablepictureinpicture></video>
    </div>

    <!-- Track info -->
    <div class="track-info">
      <div id="track-title" class="track-title">—</div>
      <div id="track-artist" class="track-artist">—</div>
    </div>

    <!-- Progress bar -->
    <div class="progress-wrap">
      <span id="time-current" class="time">0:00</span>
      <div id="progress-bar" class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
        <div id="progress-thumb" class="progress-thumb"></div>
      </div>
      <span id="time-total" class="time">0:00</span>
    </div>

    <!-- Playback controls -->
    <div class="controls">
      <button id="btn-prev" class="ctrl-btn" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button id="btn-play" class="ctrl-btn ctrl-btn--play" aria-label="Play/Pause">
        <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" class="hidden"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
      </button>
      <button id="btn-next" class="ctrl-btn" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6z"/></svg>
      </button>
    </div>

    <!-- Volume -->
    <div class="volume-wrap">
      <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8.5v7a4.49 4.49 0 0 0 2.5-3.5zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06A9 9 0 0 0 14 3.23z"/></svg>
      <input id="volume-slider" type="range" min="0" max="100" value="50" class="volume-slider">
    </div>
  </main>

  <script src="/static/app.js?v=46"></script>
</body>
</html>
