<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PiMusic — Settings</title>
  <link rel="stylesheet" href="/static/style.css?v=43">
</head>
<body class="settings-body">
  <div class="settings-page">
    <header class="settings-header">
      <a href="/" class="settings-back" title="Back to player">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </a>
      <h1>PiMusic Settings</h1>
    </header>

    <div id="status-bar" class="status-bar hidden"></div>

    <!-- Spotify -->
    <section class="settings-section">
      <h2>Spotify</h2>
      <label class="settings-label">
        SP_DC Cookie
        <input type="password" id="spotify_sp_dc" class="settings-input" placeholder="Your sp_dc cookie value">
      </label>
      <label class="settings-label">
        Client ID
        <input type="text" id="spotify_client_id" class="settings-input" placeholder="Spotify Client ID">
      </label>
      <label class="settings-label">
        Client Secret
        <input type="password" id="spotify_client_secret" class="settings-input" placeholder="Spotify Client Secret">
      </label>
      <label class="settings-label">
        Redirect URI
        <input type="text" id="spotify_redirect_uri" class="settings-input" placeholder="http://127.0.0.1:8080">
      </label>
      <div class="settings-actions">
        <button id="btn-test-spotify" class="settings-btn">Test Connection</button>
        <button id="btn-force-reauth" class="settings-btn settings-btn--danger">Force Re-Auth</button>
      </div>
    </section>

    <!-- Cider -->
    <section class="settings-section">
      <h2>Cider (Apple Music)</h2>
      <label class="settings-label">
        API Token
        <input type="password" id="cider_token" class="settings-input" placeholder="Cider apptoken">
      </label>
      <label class="settings-label">
        Host
        <input type="text" id="cider_host" class="settings-input" placeholder="http://127.0.0.1:10767">
      </label>
      <label class="settings-label">
        Storefront
        <input type="text" id="cider_storefront" class="settings-input" placeholder="us" maxlength="5">
      </label>
      <div class="settings-actions">
        <button id="btn-test-cider" class="settings-btn">Test Connection</button>
      </div>
    </section>

    <!-- Source -->
    <section class="settings-section">
      <h2>Source</h2>
      <div class="settings-row">
        <span class="settings-label-inline">Active source:</span>
        <span id="active-source" class="source-indicator">—</span>
      </div>
      <div class="settings-actions">
        <button id="btn-source-spotify" class="settings-btn">Switch to Spotify</button>
        <button id="btn-source-cider" class="settings-btn">Switch to Cider</button>
      </div>
    </section>

    <!-- Display -->
    <section class="settings-section">
      <h2>Display</h2>
      <div class="settings-label">Visual Mode</div>
      <div id="visual_mode" class="visual-mode-tiles" role="radiogroup" aria-label="Visual Mode">
        <button type="button" class="vm-tile" data-value="canvas_card" role="radio" aria-checked="false">
          <span class="vm-tile-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="14" rx="2"/><polygon points="10 9 15 12 10 15" fill="currentColor" stroke="none"/></svg>
          </span>
          <span class="vm-tile-label">Canvas<br>in Box</span>
        </button>
        <button type="button" class="vm-tile" data-value="canvas_bg" role="radio" aria-checked="false">
          <span class="vm-tile-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><rect x="8" y="9" width="8" height="6" rx="1" fill="currentColor" stroke="none"/></svg>
          </span>
          <span class="vm-tile-label">Canvas<br>Background</span>
        </button>
        <button type="button" class="vm-tile" data-value="artwork" role="radio" aria-checked="false">
          <span class="vm-tile-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><circle cx="9" cy="10" r="1.5" fill="currentColor" stroke="none"/><path d="M4 17l5-5 4 4 3-3 4 4"/></svg>
          </span>
          <span class="vm-tile-label">Artwork<br>Only</span>
        </button>
      </div>
      <label class="settings-label">
        CPU Threshold (%)
        <div class="settings-range-wrap">
          <input type="range" id="cpu_threshold" class="settings-range" min="10" max="100" value="75">
          <span id="cpu_threshold_val">75</span>
        </div>
      </label>
      <label class="settings-toggle-label">
        <input type="checkbox" id="scanline_overlay" class="settings-checkbox">
        Scanline Overlay
      </label>
      <label class="settings-toggle-label">
        <input type="checkbox" id="cinematic_auto" class="settings-checkbox">
        Auto Cinematic Mode
      </label>
    </section>

    <!-- System -->
    <section class="settings-section">
      <h2>System</h2>
      <div class="settings-row">
        <span class="settings-label-inline">CPU Usage:</span>
        <span id="cpu-usage">—</span>
      </div>
      <div class="settings-row">
        <span class="settings-label-inline">Video Disabled:</span>
        <span id="video-disabled">—</span>
      </div>
      <div class="settings-actions">
        <button id="btn-clear-cache" class="settings-btn settings-btn--danger">Clear Art Cache</button>
      </div>
    </section>

    <div class="settings-footer">
      <button id="btn-save" class="settings-btn settings-btn--primary">Save Settings</button>
    </div>
  </div>

  <script src="/static/settings.js?v=43"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
